# Health check endpoint for nginx itself
server {
    listen 80 default_server;
    server_name _;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Reject requests without valid Host header
    location / {
        return 444;
    }
}

# =============================================================================
# exibi.com.br → Landing Page (Main Domain)
# =============================================================================

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name exibi.com.br www.exibi.com.br;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://exibi.com.br$request_uri;
    }
}

# HTTPS - Landing Page
server {
    listen 443 ssl;
    http2 on;
    server_name exibi.com.br;

    ssl_certificate /etc/letsencrypt/live/exibi.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/exibi.com.br/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Proxy buffer settings
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}

# Redirect www to non-www
server {
    listen 443 ssl;
    http2 on;
    server_name www.exibi.com.br;

    ssl_certificate /etc/letsencrypt/live/exibi.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/exibi.com.br/privkey.pem;

    return 301 https://exibi.com.br$request_uri;
}

# =============================================================================
# ws.exibi.com.br → WebSocket Server (Soketi)
# =============================================================================

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name ws.exibi.com.br;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - WebSocket
server {
    listen 443 ssl;
    http2 on;
    server_name ws.exibi.com.br;

    ssl_certificate /etc/letsencrypt/live/ws.exibi.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ws.exibi.com.br/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://soketi:6001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support - REQUIRED
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
}

# =============================================================================
# app.exibi.com.br → Admin Panel (Dashboard, Login, etc.)
# =============================================================================

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name app.exibi.com.br;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Admin Panel
server {
    listen 443 ssl;
    http2 on;
    server_name app.exibi.com.br;

    ssl_certificate /etc/letsencrypt/live/app.exibi.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.exibi.com.br/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Aumentado para uploads grandes (500MB)
    client_max_body_size 500M;

    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts aumentados para uploads
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Proxy buffer settings para headers grandes (sessions, cookies)
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
